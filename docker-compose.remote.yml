version: '3.8'

services:
  # Python AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: tcti-ai-service
    restart: unless-stopped
    ports:
      - "9000:8000"
    environment:
      - AI_SERVICE_HOST=0.0.0.0
      - AI_SERVICE_PORT=8000
      - DEVICE=cpu
      - CLASSIFIER_MODEL=facebook/bart-large-mnli
      # Remote ELK Configuration
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
      - DATALAKE_INDEX=${DATALAKE_INDEX}
      - PROCESSED_INDEX=${PROCESSED_INDEX}
      - WAREHOUSE_INDEX=${WAREHOUSE_INDEX}
      # API Keys
      - DATALAKE_API_KEY=${DATALAKE_API_KEY}
      - WAREHOUSE_API_KEY=${WAREHOUSE_API_KEY}
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_SERVICE_API_KEYS=tcti-dashboard-key,admin-key
    volumes:
      - ai-model-cache:/root/.cache/huggingface
    networks:
      - tcti-network

volumes:
  ai-model-cache:


networks:
  tcti-network:
    driver: bridge
