version: '3.8'

services:
  # Python AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: tcti-ai-service
    restart: unless-stopped
    ports:
      - "9000:8000"
    environment:
      - AI_SERVICE_HOST=0.0.0.0
      - AI_SERVICE_PORT=8000
      - DEVICE=cpu
      - CLASSIFIER_MODEL=facebook/bart-large-mnli
      # Remote ELK Configuration
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
      - DATALAKE_INDEX=${DATALAKE_INDEX}
      - PROCESSED_INDEX=${PROCESSED_INDEX}
      - WAREHOUSE_INDEX=${WAREHOUSE_INDEX}
      # API Keys
      - DATALAKE_API_KEY=${DATALAKE_API_KEY}
      - WAREHOUSE_API_KEY=${WAREHOUSE_API_KEY}
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_SERVICE_API_KEYS=tcti-dashboard-key,admin-key
    volumes:
      - ai-model-cache:/root/.cache/huggingface
    networks:
      - tcti-network

  # Next.js Dashboard
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: tcti-dashboard
    restart: unless-stopped
    ports:
      - "9001:3000"
    environment:
      - NODE_ENV=production
      - AI_SERVICE_URL=http://ai-service:8000
      # Internal Dashboard API Key
      - AI_SERVICE_API_KEY=tcti-dashboard-key
      # Remote ELK
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
      - WAREHOUSE_INDEX=${WAREHOUSE_INDEX}
      - ELASTICSEARCH_API_KEY=${ELASTICSEARCH_API_KEY}
      # Authentication
      - DASHBOARD_AUTH_USER=admin
      - DASHBOARD_AUTH_PASSWORD=TCTI_Admin_2026!
      - DASHBOARD_2FA_SECRET=JBSWY3DPEHPK3PXP
      - DASHBOARD_REQUIRE_2FA=false
      - DASHBOARD_SESSION_SECRET=super_secret_session_key_2026_CHANGE_ME_IN_PROD
      - COOKIE_SECURE=false
    depends_on:
      - ai-service
    networks:
      - tcti-network

volumes:
  ai-model-cache:


networks:
  tcti-network:
    driver: bridge
