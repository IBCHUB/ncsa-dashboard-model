version: '3.8'

services:
  # Elasticsearch - Data Lake & Data Warehouse
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: tcti-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - tcti-network

  # Kibana - Elasticsearch UI
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: tcti-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - tcti-network

  # Python AI Service for NLP Classification & Risk Scoring
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: tcti-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - AI_SERVICE_HOST=0.0.0.0
      - AI_SERVICE_PORT=8000
      # Comma-separated API keys accepted by AI Service (X-API-Key)
      # Set AI_SERVICE_API_KEYS in your .env file (see .env.example)
      - AI_SERVICE_API_KEYS=${AI_SERVICE_API_KEYS:?Set AI_SERVICE_API_KEYS in .env file}
      - AI_SERVICE_REQUIRE_AUTH=${AI_SERVICE_REQUIRE_AUTH:-true}
      - DEVICE=cpu
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - DATALAKE_INDEX=tcti-datalake
      - WAREHOUSE_INDEX=tcti-warehouse
      - EXTERNAL_PARTNER_REGISTRY_JSON=${EXTERNAL_PARTNER_REGISTRY_JSON:-[]}
      # OpenAI API Key for translation (loaded from host environment)
    volumes:
      # Cache HuggingFace models to avoid re-downloading
      - ai-model-cache:/root/.cache/huggingface
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - tcti-network

volumes:
  ai-model-cache:
  es-data:


networks:
  tcti-network:
    driver: bridge
