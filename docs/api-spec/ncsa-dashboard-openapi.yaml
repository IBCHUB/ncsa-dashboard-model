              schema:
                $ref: '#/components/schemas/UserGroupListResponse'
    post:
      tags: [Users]
      summary: สร้าง user group
      operationId: createUserGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserGroupCreateRequest'
      responses:
        '201':
          description: created user group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserGroupResponse'

  /api/v1/user-groups/{group_id}:
    patch:
      tags: [Users]
