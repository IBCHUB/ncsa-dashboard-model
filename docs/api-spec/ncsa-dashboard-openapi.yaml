            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserGroupUpdateRequest'
      responses:
        '200':
          description: updated user group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserGroupResponse'
    delete:
      tags: [Users]
      summary: ลบ user group
      operationId: deleteUserGroup
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: user group deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleActionResponse'

  /api/v1/notifications:
    get:
      tags: [Notifications]
