openapi: 3.0.3
info:
  title: NCSA Dashboard Web API
  version: 1.0.0
  description: |
    สัญญา API หลักสำหรับ `ncsa-dashboard-web`

    หลักการสำคัญ:
    - canonical path ใช้ `/api/v1/...`
    - response มาตรฐานใช้ `data`, `meta`, `error`
    - authentication ใช้ `Bearer token`
    - external sharing API ใช้ namespace `/api/v1/external/...` และ `X-API-Key`
    - web client สามารถเก็บ token ใน cookie ชื่อ `token` ได้ตามพฤติกรรมของ UI ปัจจุบัน
    - analytics ทั้งหมดใช้ timezone เริ่มต้น `Asia/Bangkok`
servers:
  - url: https://api.example.com
    description: Production placeholder
  - url: http://localhost:8000
    description: Local backend
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Lookups
  - name: Executive
  - name: Operations
  - name: Actions
  - name: IOCs
  - name: Reports
  - name: News
  - name: Account
  - name: Users
  - name: Notifications
  - name: ExternalSharing
paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: เข้าสู่ระบบ
      operationId: login
      security: []
      x-compat-aliases:
        - path: /login
          method: POST
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  username: analyst01
                  password: secret-password
      responses:
        '200':
          description: เข้าสู่ระบบสำเร็จ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                success:
                  value:
                    data:
                      access_token: jwt-token
                      token_type: Bearer
                      expires_in: 3600
                      user:
                        user_id: usr-001
                        username: analyst01
                        name: Natakarn Kanjanamas
                        role_name: Admin
                        avatar_url: /avatars/usr-001.png
                    meta:
                      request_id: req-login-001
                      generated_at: '2026-03-11T11:45:00+07:00'
                      timezone: Asia/Bangkok
                    error: null
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: ดึงข้อมูล session ปัจจุบัน
      operationId: getCurrentSession
      responses:
        '200':
          description: ข้อมูลผู้ใช้ปัจจุบัน
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: ออกจากระบบ
      operationId: logout
      responses:
        '200':
          description: ออกจากระบบสำเร็จ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'

  /api/v1/lookups/threat-types:
    get:
      tags: [Lookups]
      summary: รายการ threat types
      operationId: listThreatTypes
      x-compat-aliases:
        - path: /threat-type
          method: GET
      parameters:
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/ActiveOnly'
      responses:
        '200':
          description: threat type options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LookupListResponse'

  /api/v1/lookups/severities:
    get:
      tags: [Lookups]
      summary: รายการ severity
      operationId: listSeverities
      x-compat-aliases:
        - path: /severity
          method: GET
      parameters:
        - $ref: '#/components/parameters/ActiveOnly'
      responses:
        '200':
          description: severity options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LookupListResponse'

  /api/v1/lookups/risk-levels:
    get:
      tags: [Lookups]
      summary: รายการ risk levels
      operationId: listRiskLevels
      x-compat-aliases:
        - path: /rick-level
          method: GET
      parameters:
        - $ref: '#/components/parameters/ActiveOnly'
      responses:
        '200':
          description: risk level options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LookupListResponse'

  /api/v1/lookups/sources:
    get:
      tags: [Lookups]
      summary: รายการ intelligence sources
      operationId: listSources
      x-compat-aliases:
        - path: /source
          method: GET
      parameters:
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/ActiveOnly'
      responses:
        '200':
          description: source options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LookupListResponse'

  /api/v1/lookups/export-formats:
    get:
      tags: [Lookups]
      summary: รายการ export formats
      operationId: listExportFormats
      x-compat-aliases:
        - path: /export-type
          method: GET
      responses:
        '200':
          description: export format options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LookupListResponse'

  /api/v1/lookups/assignees:
    get:
      tags: [Lookups]
      summary: รายชื่อผู้รับมอบหมาย
      operationId: listAssignees
      parameters:
        - $ref: '#/components/parameters/Query'
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
      responses:
        '200':
          description: assignee options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LookupAssigneeResponse'

  /api/v1/lookups/enforcement-points:
    get:
      tags: [Lookups]
      summary: รายการ enforcement points
      operationId: listEnforcementPoints
      parameters:
        - $ref: '#/components/parameters/Query'
        - name: type
          in: query
          schema:
            type: string
            example: firewall
      responses:
        '200':
          description: enforcement point options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnforcementPointListResponse'

  /api/v1/executive/dashboard:
    get:
      tags: [Executive]
      summary: ข้อมูล executive dashboard ทั้งหน้า
      operationId: getExecutiveDashboard
      parameters:
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
      responses:
        '200':
          description: executive dashboard payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutiveDashboardResponse'

  /api/v1/reports/executive/preview:
    post:
      tags: [Reports]
      summary: preview รายงาน executive dashboard
      operationId: previewExecutiveReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutiveReportRequest'
      responses:
        '200':
          description: executive preview payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutiveDashboardResponse'

  /api/v1/reports/executive/export:
    post:
      tags: [Reports]
      summary: สร้าง export job สำหรับ executive dashboard
      operationId: exportExecutiveReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IocReportExportRequest'
      responses:
        '202':
          description: export job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJobResponse'

  /api/v1/operations/dashboard:
    get:
      tags: [Operations]
      summary: ข้อมูล operations dashboard ทั้งหน้า
      operationId: getOperationsDashboard
      x-compat-aliases:
        - path: /dashboard
          method: GET
        - path: /incidentbyseverity
          method: GET
        - path: /attacktime
          method: GET
        - path: /intelligencesources
          method: GET
        - path: /threattype
          method: GET
        - path: /countriesbythreatassociation
          method: GET
        - path: /targetsectors
          method: GET
      parameters:
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
      responses:
        '200':
          description: operations dashboard payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationsDashboardResponse'

  /api/v1/operations/reports/{report_key}:
    get:
      tags: [Operations]
      summary: รายงาน detail ของ top list
      operationId: getOperationsReport
      parameters:
        - name: report_key
          in: path
          required: true
          schema:
            type: string
            enum:
              - intelligence-sources
              - threat-types
              - attack-origins
              - target-sectors
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Query'
        - name: threat_types
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: sources
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: severities
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: report detail payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationsReportResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/reports/operations/{report_key}/preview:
    post:
      tags: [Reports]
      summary: preview รายงาน operations detail
      operationId: previewOperationsReport
      parameters:
        - name: report_key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OperationsReportPreviewRequest'
      responses:
        '200':
          description: operations report preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationsReportResponse'

  /api/v1/reports/operations/{report_key}/export:
    post:
      tags: [Reports]
      summary: สร้าง export job สำหรับ operations detail report
      operationId: exportOperationsReport
      parameters:
        - name: report_key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IocReportExportRequest'
      responses:
        '202':
          description: export job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJobResponse'

  /api/v1/operations/attack-time-report:
    get:
      tags: [Operations]
      summary: รายงาน attack time analysis
      operationId: getAttackTimeReport
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
        - name: threat_types
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: sources
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: severities
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: attack time report payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttackTimeReportResponse'

  /api/v1/operations/events/{event_id}:
    get:
      tags: [Operations]
      summary: รายละเอียด event และ raw payload
      operationId: getOperationEvent
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: event detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttackEventDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/actions:
    get:
      tags: [Actions]
      summary: รายการ action tickets พร้อม summary และ facets
      operationId: listActions
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
        - name: threat_types
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: sources
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: severities
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: status
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              enum: [open, in_progress, closed]
      responses:
        '200':
          description: paged action tickets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionListResponse'

  /api/v1/actions/{action_id}:
    get:
      tags: [Actions]
      summary: รายละเอียด action ticket
      operationId: getActionDetail
      parameters:
        - name: action_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: action detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/actions/{action_id}/related-iocs:
    get:
      tags: [Actions]
      summary: IOC ที่เกี่ยวข้องกับ action ticket
      operationId: listRelatedIocs
      parameters:
        - name: action_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: related IOC list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelatedIocsResponse'

  /api/v1/actions/{action_id}/assign:
    post:
      tags: [Actions]
      summary: มอบหมาย action ticket
      operationId: assignAction
      parameters:
        - name: action_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionAssignRequest'
            examples:
              default:
                value:
                  assignee_id: usr-002
                  handover_note: Investigate source IP and confirm gateway block.
      responses:
        '200':
          description: assignment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionMutationResponse'

  /api/v1/actions/{action_id}/false-positive:
    post:
      tags: [Actions]
      summary: ปิด ticket เป็น false positive
      operationId: markFalsePositive
      parameters:
        - name: action_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FalsePositiveRequest'
      responses:
        '200':
          description: false positive recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionMutationResponse'

  /api/v1/actions/{action_id}/block-ip:
    post:
      tags: [Actions]
      summary: สั่ง block IP
      operationId: blockActionIp
      parameters:
        - name: action_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockIpRequest'
            examples:
              default:
                value:
                  target_ioc: 192.168.10.5
                  enforcement_point_ids: [fw-bkk-01, waf-bkk-02]
                  duration_mode: temporary
                  duration_days: 7
                  reason: Block confirmed malicious traffic
      responses:
        '200':
          description: block execution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionMutationResponse'

  /api/v1/reports/actions/preview:
    post:
      tags: [Reports]
      summary: preview รายงาน action center
      operationId: previewActionReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionReportRequest'
      responses:
        '200':
          description: action report preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionListResponse'

  /api/v1/reports/actions/export:
    post:
      tags: [Reports]
      summary: สร้าง export job สำหรับ action center
      operationId: exportActionReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionReportRequest'
      responses:
        '202':
          description: export job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJobResponse'

  /api/v1/iocs:
    get:
      tags: [IOCs]
      summary: IOC list พร้อม quick filters, facets และ global search
      operationId: listIocs
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
        - name: sources
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: threat_types
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: risk_levels
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: ioc_types
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: severities
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: high_risk_only
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: IOC resource list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IocListResponse'

  /api/v1/iocs/{ioc_id}:
    get:
      tags: [IOCs]
      summary: IOC detail
      operationId: getIocDetail
      parameters:
        - name: ioc_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: IOC detail payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IocDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/iocs/{ioc_id}/events:
    get:
      tags: [IOCs]
      summary: IOC history / observations
      operationId: listIocEvents
      parameters:
        - name: ioc_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: IOC event history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IocEventsResponse'

  /api/v1/ioc-analytics:
    get:
      tags: [IOCs]
      summary: IOC analytics dashboard
      operationId: getIocAnalytics
      parameters:
        - name: tab
          in: query
          required: true
          schema:
            type: string
            enum: [ioc-summary, statistics-import]
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
      responses:
        '200':
          description: IOC analytics payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IocAnalyticsResponse'

  /api/v1/reports/ioc/preview:
    post:
      tags: [Reports]
      summary: preview รายงาน IOC
      operationId: previewIocReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IocReportPreviewRequest'
      responses:
        '200':
          description: report preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IocReportPreviewResponse'

  /api/v1/reports/ioc/export:
    post:
      tags: [Reports]
      summary: สร้าง export job สำหรับรายงาน IOC
      operationId: exportIocReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IocReportExportRequest'
      responses:
        '202':
          description: export job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJobResponse'

  /api/v1/reports/most-frequent-threats/preview:
    post:
      tags: [Reports]
      summary: preview รายงาน most frequent threats
      operationId: previewMostFrequentThreats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MostFrequentThreatsPreviewRequest'
      responses:
        '200':
          description: most frequent threats preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MostFrequentThreatsPreviewResponse'

  /api/v1/exports/{export_id}:
    get:
      tags: [Reports]
      summary: เช็กสถานะ export job
      operationId: getExportJob
      parameters:
        - name: export_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: export job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJobResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/news:
    get:
      tags: [News]
      summary: รายการข่าวไซเบอร์
      operationId: listNews
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
        - $ref: '#/components/parameters/SortBy'
        - name: sources
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: paged news list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsListResponse'

  /api/v1/news/{article_id}:
    get:
      tags: [News]
      summary: รายละเอียดข่าวไซเบอร์
      operationId: getNewsArticle
      parameters:
        - name: article_id
          in: path
