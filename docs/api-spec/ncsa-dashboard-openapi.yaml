        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
      responses:
        '200':
          description: bulk update result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkMarkReadResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    Query:
      name: query
      in: query
      schema:
        type: string
    SortBy:
      name: sort_by
      in: query
      schema:
        type: string
        default: created_at
    SortOrder:
      name: sort_order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    StartDate:
      name: start_date
      in: query
      schema:
        type: string
        format: date
    EndDate:
      name: end_date
      in: query
      schema:
        type: string
        format: date
    ActiveOnly:
      name: active
      in: query
      schema:
        type: boolean
        default: true
  responses:
    Unauthorized:
      description: ไม่ได้รับอนุญาต
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: ไม่พบข้อมูล
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    ApiMeta:
      type: object
      properties:
        request_id:
          type: string
        generated_at:
          type: string
          format: date-time
        timezone:
          type: string
          example: Asia/Bangkok
      required: [generated_at, timezone]
    PagedMeta:
      allOf:
        - $ref: '#/components/schemas/ApiMeta'
        - type: object
          properties:
            page:
              type: integer
            page_size:
              type: integer
            total:
              type: integer
            total_pages:
              type: integer
          required: [page, page_size, total, total_pages]
    ErrorObject:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
      required: [code, message]
    ErrorEnvelope:
      type: object
      properties:
        data:
          nullable: true
        meta:
          $ref: '#/components/schemas/ApiMeta'
        error:
          $ref: '#/components/schemas/ErrorObject'
      required: [meta, error]
    ResponseBase:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/ApiMeta'
        error:
          $ref: '#/components/schemas/ErrorObject'
          nullable: true
      required: [meta, error]
    PagedResponseBase:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/PagedMeta'
        error:
          $ref: '#/components/schemas/ErrorObject'
          nullable: true
      required: [meta, error]
    LookupItem:
      type: object
      properties:
        value:
          type: string
        label:
          type: string
        description:
          type: string
          nullable: true
        active:
          type: boolean
          default: true
      required: [value, label]
    AssigneeItem:
      type: object
      properties:
        user_id:
          type: string
        name:
          type: string
        role_name:
          type: string
        avatar_url:
          type: string
          nullable: true
        status:
          type: string
      required: [user_id, name, role_name, status]
    EnforcementPoint:
      type: object
      properties:
        enforcement_point_id:
          type: string
        name:
          type: string
        type:
          type: string
        location:
          type: string
          nullable: true
        active:
          type: boolean
      required: [enforcement_point_id, name, type, active]
    UserSummary:
      type: object
      properties:
        user_id:
          type: string
        username:
          type: string
        name:
          type: string
        role_name:
          type: string
        avatar_url:
          type: string
          nullable: true
      required: [user_id, username, name, role_name]
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          format: password
      required: [username, password]
    LoginPayload:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
        user:
          $ref: '#/components/schemas/UserSummary'
      required: [access_token, token_type, expires_in, user]
    LogoutPayload:
      type: object
      properties:
        logged_out:
          type: boolean
      required: [logged_out]
    LookupListPayload:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LookupItem'
      required: [items]
    LookupAssigneePayload:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AssigneeItem'
      required: [items]
    EnforcementPointListPayload:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EnforcementPoint'
      required: [items]
    TopListItem:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        value:
          type: number
        percentage:
          type: number
          nullable: true
        color:
          type: string
          nullable: true
      required: [key, label, value]
    SeveritySlice:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        color:
          type: string
        value:
          type: integer
        percentage:
          type: number
      required: [key, label, color, value, percentage]
    PrimarySector:
      type: object
      properties:
        name:
          type: string
        value:
          type: integer
      required: [name, value]
    ThreatLevelCard:
      type: object
      properties:
        date:
          type: string
          format: date
        level:
          type: string
        level_th:
          type: string
        score:
          type: number
        delta_percent:
          type: number
          nullable: true
        primary_sector:
          $ref: '#/components/schemas/PrimarySector'
      required: [date, level, level_th, score, primary_sector]
    ExposureSummary:
      type: object
      properties:
        total_threats:
          type: integer
        ioc_active:
          type: integer
        critical_active:
          type: integer
        high_active:
          type: integer
      required: [total_threats, ioc_active, critical_active, high_active]
    TreemapNode:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        severity:
          type: string
        value:
          type: integer
      required: [id, label, severity, value]
    TreemapPayload:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/TreemapNode'
      required: [nodes]
    TrendPoint:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        total:
          type: integer
        critical:
          type: integer
        high:
          type: integer
        point_type:
          type: string
          enum: [historical, forecast]
      required: [timestamp, total, critical, high, point_type]
    ForecastTrendPayload:
      type: object
      properties:
        points:
          type: array
          items:
            $ref: '#/components/schemas/TrendPoint'
        forecast_start_index:
          type: integer
      required: [points, forecast_start_index]
    MapOrigin:
      type: object
      properties:
        country_code:
          type: string
          nullable: true
        country_name:
          type: string
        value:
          type: integer
        latitude:
          type: number
        longitude:
          type: number
      required: [country_name, value, latitude, longitude]
    MapConnection:
      type: object
      properties:
        origin_country:
          type: string
        target_country:
          type: string
        count:
          type: integer
      required: [origin_country, target_country, count]
    AttackOriginMap:
      type: object
      properties:
        target_country:
          type: string
        origins:
          type: array
          items:
            $ref: '#/components/schemas/MapOrigin'
        connections:
          type: array
          items:
            $ref: '#/components/schemas/MapConnection'
      required: [target_country, origins, connections]
    ExecutiveDashboardPayload:
      type: object
      properties:
        threat_level:
          $ref: '#/components/schemas/ThreatLevelCard'
        exposure_today:
          $ref: '#/components/schemas/ExposureSummary'
        severity_distribution:
          type: array
          items:
            $ref: '#/components/schemas/SeveritySlice'
        threat_volume_severity:
          $ref: '#/components/schemas/TreemapPayload'
        attack_volume_trend:
          $ref: '#/components/schemas/ForecastTrendPayload'
        attack_origin_map:
          $ref: '#/components/schemas/AttackOriginMap'
        filters:
          type: object
          additionalProperties: true
      required:
        - threat_level
        - exposure_today
        - severity_distribution
        - threat_volume_severity
        - attack_volume_trend
        - attack_origin_map
    OperationsOverview:
      type: object
      properties:
        active_ioc:
          type: integer
        critical_ioc_active:
          type: integer
        new_ioc:
          type: integer
        sources_active:
          type: integer
      required: [active_ioc, critical_ioc_active, new_ioc, sources_active]
    HeatmapCell:
      type: object
      properties:
        x:
          type: string
        y:
          type: string
        value:
          type: integer
      required: [x, y, value]
    HeatmapMatrix:
      type: object
      properties:
        mode:
          type: string
          example: day-hour
        x_axis:
          type: array
          items:
            type: string
        y_axis:
          type: array
          items:
            type: string
        cells:
          type: array
          items:
            $ref: '#/components/schemas/HeatmapCell'
      required: [mode, x_axis, y_axis, cells]
    OperationsDashboardPayload:
      type: object
      properties:
        overview:
          $ref: '#/components/schemas/OperationsOverview'
        incident_by_severity:
          type: array
          items:
            $ref: '#/components/schemas/SeveritySlice'
        attack_time_heatmap:
          $ref: '#/components/schemas/HeatmapMatrix'
        top_intelligence_sources:
          type: array
          items:
            $ref: '#/components/schemas/TopListItem'
        top_threat_types:
          type: array
          items:
            $ref: '#/components/schemas/TopListItem'
        top_attack_origins:
          type: array
          items:
            $ref: '#/components/schemas/TopListItem'
        target_sectors:
          type: array
          items:
            $ref: '#/components/schemas/TopListItem'
      required:
        - overview
        - incident_by_severity
        - attack_time_heatmap
        - top_intelligence_sources
        - top_threat_types
        - top_attack_origins
        - target_sectors
    SimpleSeriesPoint:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        value:
          type: number
      required: [timestamp, value]
    TrendSeries:
      type: object
      properties:
        key:
          type: string
        name:
          type: string
        label:
          type: string
        color:
          type: string
          nullable: true
        buckets:
          type: array
          items:
            type: string
        points:
          type: array
          items:
            type: integer
        total:
          type: integer
        direction:
          type: string
        change_percent:
          type: number
      required: [label, points]
    SourceSeverityDistributionRow:
      type: object
      properties:
        label:
          type: string
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer
        clean:
          type: integer
          nullable: true
      required: [label, critical, high, medium, low]
    RankingItem:
      type: object
      properties:
        rank:
          type: integer
        label:
          type: string
        group_type:
          type: string
          nullable: true
        change_direction:
          type: string
        change_percent:
          type: number
        main_threat_type:
          type: string
          nullable: true
        severity_distribution:
          type: object
          additionalProperties:
            type: integer
        total_events:
          type: integer
        share_percent:
          type: number
        sources:
          type: array
          items:
            type: string
        sample_iocs:
          type: array
          items:
            type: string
        last_seen:
          type: string
          format: date-time
          nullable: true
      required: [rank, label, total_events, share_percent]
    OperationsReportPayload:
      type: object
      properties:
        report_key:
          type: string
        title:
          type: string
        summary:
          type: object
          additionalProperties: true
        filters:
          type: object
          additionalProperties: true
        top_chart:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/TopListItem'
          required: [items]
        severity_distribution:
          type: object
          properties:
            rows:
              type: array
              items:
                $ref: '#/components/schemas/SourceSeverityDistributionRow'
          required: [rows]
        trend_comparison:
          type: object
          properties:
            series:
              type: array
              items:
                $ref: '#/components/schemas/TrendSeries'
          required: [series]
        ranking:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/RankingItem'
            total:
              type: integer
            page:
              type: integer
            page_size:
              type: integer
          required: [items, total, page, page_size]
      required: [report_key, title, top_chart, severity_distribution, trend_comparison, ranking]
    PeriodDescriptor:
      type: object
      properties:
        day:
          type: string
        time_range:
          type: string
      required: [day, time_range]
    AttackTimeSummary:
      type: object
      properties:
        peak_attack_time:
          $ref: '#/components/schemas/PeriodDescriptor'
        quietest_period:
          $ref: '#/components/schemas/PeriodDescriptor'
        avg_attack_rate:
          type: number
        highest_day:
          type: string
        total_events:
          type: integer
      required: [peak_attack_time, quietest_period, avg_attack_rate, highest_day, total_events]
    AttackEvent:
      type: object
      properties:
        event_id:
          type: string
        timestamp:
          type: string
          format: date-time
        severity:
          type: string
        threat_types:
          type: array
          items:
            type: string
        ioc_value:
          type: string
        source_attacker:
          type: string
          nullable: true
        target_victim:
          type: string
          nullable: true
        source_name:
          type: string
        description:
          type: string
          nullable: true
      required: [event_id, timestamp, severity, threat_types, ioc_value, source_name]
    AttackTimeReportPayload:
      type: object
      properties:
        summary:
          $ref: '#/components/schemas/AttackTimeSummary'
        filters:
          type: object
          additionalProperties: true
        heatmap:
          $ref: '#/components/schemas/HeatmapMatrix'
        events:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/AttackEvent'
            total:
              type: integer
          required: [items, total]
      required: [summary, heatmap, events]
    AttackEventDetail:
      type: object
      properties:
        event_id:
          type: string
        formatted:
          $ref: '#/components/schemas/AttackEvent'
        raw_json:
          type: object
          additionalProperties: true
      required: [event_id, formatted, raw_json]
    FacetItem:
      type: object
      properties:
        value:
          type: string
        label:
          type: string
        count:
          type: integer
      required: [value, label, count]
    ActionSummaryCounters:
      type: object
      properties:
        total:
          type: integer
        open:
          type: integer
        in_progress:
          type: integer
        closed:
          type: integer
      required: [total, open, in_progress, closed]
    ActionFacetSet:
      type: object
      properties:
        threat_types:
          type: array
          items:
            $ref: '#/components/schemas/FacetItem'
        sources:
          type: array
          items:
            $ref: '#/components/schemas/FacetItem'
        severities:
          type: array
          items:
            $ref: '#/components/schemas/FacetItem'
        statuses:
          type: array
